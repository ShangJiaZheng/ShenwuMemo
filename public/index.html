                document.getElementById('image-modal').addEventListener('click', function (e) {
                    if (e.target === this) {
                        closeImages();
                    }
                });

                // 添加备注输入框的事件监听器
                addNoteInputListeners();
            });

            // 图片相关功能
            async function showImages(date) {
                try {
                    const response = await fetch(`/get_images?date=${date}`);
                    const data = await response.json();
                    const images = Array.isArray(data) ? data : data.files || [];

                    const gallery = document.getElementById('image-gallery');
                    gallery.innerHTML = '';

                    if (images.length === 0) {
                        gallery.innerHTML = '<p class="text-gray-500 text-center py-8">该日期没有图片</p>';
                    } else {
                        images.forEach(img => {
                            const imgName = typeof img === 'string' ? img : img.filename || img.name;
                            const imgElement = document.createElement('img');
                            imgElement.src = `/${imgName}`;
                            imgElement.alt = imgName;
                            imgElement.className = 'cursor-pointer hover:opacity-75 transition-opacity max-w-full h-auto rounded';
                            imgElement.onclick = () => showFullImage(`/${imgName}`);

                            const container = document.createElement('div');
                            container.className = 'relative p-2';
                            container.appendChild(imgElement);

                            gallery.appendChild(container);
                        });
                    }

                    document.getElementById('image-modal').classList.remove('hidden');
                } catch (error) {
                    console.error('加载图片失败:', error);
                    const gallery = document.getElementById('image-gallery');
                    gallery.innerHTML = '<p class="text-red-500 text-center py-8">加载图片失败</p>';
                    document.getElementById('image-modal').classList.remove('hidden');
                }
            }

            function closeImages() {
                document.getElementById('image-modal').classList.add('hidden');
            }

            function showFullImage(src) {
                // 创建或获取预览容器
                let previewContainer = document.getElementById('image-preview-container');
                if (!previewContainer) {
                    previewContainer = document.createElement('div');
                    previewContainer.id = 'image-preview-container';
                    previewContainer.className = 'fixed inset-0 bg-black bg-opacity-50 backdrop-blur-sm flex items-center justify-center z-[60] cursor-zoom-out transition-all duration-300';
                    previewContainer.onclick = function() {
                        this.classList.add('opacity-0');
                        setTimeout(() => this.remove(), 300);
                    };
                    document.body.appendChild(previewContainer);
                    // 添加一个小延迟以确保过渡效果显示
                    setTimeout(() => {
                        previewContainer.style.opacity = '1';
                    }, 10);
                } else {
                    previewContainer.innerHTML = '';
                }
                
                // 创建图片元素
                const img = document.createElement('img');
                img.src = src;
                img.className = 'max-w-[90%] max-h-[90vh] object-contain shadow-xl transition-transform duration-300 transform scale-95';
                img.onload = function() {
                    this.classList.remove('scale-95');
                    this.classList.add('scale-100');
                };
                img.onclick = function(e) {
                    e.stopPropagation(); // 防止点击图片时关闭预览
                };
                
                previewContainer.appendChild(img);
            }

            // 根据银币数量设置颜色样式
            function getSilverColorStyle(amount) {
                const numStr = Math.abs(amount).toString();
                const length = numStr.replace(/,/g, '').length;

                if (length >= 9) {
                    return 'color: red; font-size: 0.85em;'; // 9位数及以上显示红色并稍微缩小字体
                } else if (length === 8) {
                    return 'color: red; font-size: 0.9em;'; // 8位数显示红色并稍微缩小字体
                } else if (length === 7) {
                    return 'color: purple;'; // 7位数显示紫色
                } else if (length === 6) {
                    return 'color: orange;'; // 6位数显示橙色
                } else if (length === 5) {
                    return 'color: blue;'; // 5位数显示蓝色
                }
                return 'color: text-orange-600;'; // 默认颜色
            }

            // 根据金额和类型获取对应的样式类
            function getAmountClass(amount, type = 'profit') {
                // 不同类型使用不同的样式逻辑
                if (type === 'remaining') {
                    // 剩余列：根据数字位数显示不同颜色，不添加背景色
                    const numStr = Math.abs(amount).toString();
                    const length = numStr.replace(/,/g, '').length;
                    
                    if (length >= 8) {
                        return 'text-red-600'; // 8位数及以上显示红色
                    } else if (length === 7) {
                        return 'text-purple-600'; // 7位数显示紫色
                    } else if (length === 6) {
                        return 'text-orange-600'; // 6位数显示橙色
                    } else {
                        return 'text-blue-600'; // 5位数及以下显示蓝色
                    }
                } else if (type === 'expense') {
                    // 消耗列：不做颜色变化，始终为黑色
                    return 'text-gray-900';
                } else if (type === 'profit-container') {
                    // 收益列容器：根据金额设置背景色，应用到整个容器
                    let className = amount >= 0 ? 'text-white font-bold' : 'text-red-600';
                    
                    if (amount > 0) {
                        if (amount > 200000) {
                            className += ' bg-red-500'; // 超过20w显示红色背景
                        } else if (amount > 100000) {
                            className += ' bg-purple-500'; // 低于20w高于10w显示紫色背景
                        } else {
                            className += ' bg-gray-300 text-gray-800'; // 低于10w显示灰色背景
                        }
                    }
                    
                    return className;
                } else {
                    // 收益列：根据金额设置背景色（保留用于兼容）
                    let className = amount >= 0 ? 'text-white font-bold' : 'text-red-600';
                    
                    if (amount > 0) {
                        if (amount > 200000) {
                            className += ' bg-red-500'; // 超过20w显示红色背景
                        } else if (amount > 100000) {
                            className += ' bg-purple-500'; // 低于20w高于10w显示紫色背景
                        } else {
                            className += ' bg-gray-300 text-gray-800'; // 低于10w显示灰色背景
                        }
                    }
                    
                    return className;
                }
            }
            
            // 存储有消耗详情的日期
            const datesWithExpenseDetails = new Set();
            
            // 预加载有消耗详情的日期
            async function loadDatesWithExpenseDetails() {
                try {
                    // 这里只是模拟，实际应用中应该从服务器获取有详情的日期列表
                    const response = await fetch('/get_dates_with_expense_details');
                    const data = await response.json();
                    data.forEach(date => datesWithExpenseDetails.add(date));
                } catch (error) {
                    console.error('加载有消耗详情的日期失败:', error);
                    // 如果获取失败，默认金额大于0的日期都有详情
                    try {
                        // 在错误处理中获取数据，确保records有定义
                        const dataResponse = await fetch('/data');
                        const data = await dataResponse.json();
                        const records = data.records || data.data || [];
                        records.forEach(record => {
                            if (parseFloat(record.消耗银币 || 0) > 0) {
                                datesWithExpenseDetails.add(record.日期);
                            }
                        });
                    } catch (dataError) {
                        console.error('获取数据失败:', dataError);
                        // 如果仍然失败，则不添加任何日期
                    }
                }
            }
            
            // 检查是否有消耗详情
            function hasExpenseDetails(date) {
                return datesWithExpenseDetails.has(date);
            }

            // 打开消耗详情模态框
            function openExpenseDetails(date, amount) {
                if (amount <= 0) return; // 当为0时双击没有效果

                const modal = document.getElementById('expense-details-modal');
                const expenseDate = document.getElementById('expense-date');
                const expenseAmount = document.getElementById('expense-amount');
                const expenseDetails = document.getElementById('expense-details');

                // 设置日期和金额
                expenseDate.value = date;
                expenseAmount.value = amount.toLocaleString();

                // 加载已保存的详情
                loadExpenseDetails(date);

                // 显示模态框
                modal.classList.remove('hidden');
            }

            // 关闭消耗详情模态框
            function closeExpenseDetailsModal() {
                const modal = document.getElementById('expense-details-modal');
                modal.classList.add('hidden');
            }

            // 加载消耗详情
            async function loadExpenseDetails(date) {
                try {
                    const response = await fetch(`/get_expense_details?date=${date}`);
                    const data = await response.json();

                    // 保存当前状态为上次保存的状态
                    previousExpenseDetailsState = {
                        date: date,
                        details: data.details || ''
                    };

                    if (data.details) {
                        document.getElementById('expense-details').value = data.details;
                    } else {
                        document.getElementById('expense-details').value = '';
                    }

                    // 显示撤回按钮（如果有上次保存的状态）
                    const undoBtn = document.getElementById('undo-expense-details-btn');
                    if (undoBtn && previousExpenseDetailsState) {
                        undoBtn.classList.remove('hidden');
                    }
                } catch (error) {
                    console.error('加载消耗详情失败:', error);
                    document.getElementById('expense-details').value = '';
                }
            }

            // 保存消耗详情
            async function saveExpenseDetails() {
                const date = document.getElementById('expense-date').value;
                const details = document.getElementById('expense-details').value;

                try {
                    const response = await fetch('/save_expense_details', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ date, details })
                    });

                    const result = await response.json();
                    if (result.success) {
                        // 保存成功后更新上次保存的状态
                        previousExpenseDetailsState = { date, details };
                        // 添加成功提示
                        showToast('消耗详情保存成功');
                        closeExpenseDetailsModal();
                    } else {
                        console.error('保存失败:', result.message);
                    }
                } catch (error) {
                    console.error('保存消耗详情失败:', error);
                }
            }

            // 表单提交处理
            document.getElementById('add-form').addEventListener('submit', async (e) => {
                e.preventDefault();

                const 日期 = document.getElementById('日期').value;
                const 剩余银币 = document.getElementById('剩余银币').value;
                const 消耗银币 = document.getElementById('消耗银币').value;

                // 先上传图片
                const files = document.getElementById('图片上传').files;
                if (files.length > 0) {
                    for (let file of files) {
                        const formData = new FormData();
                        formData.append('image', file);
                        formData.append('date', 日期);

                        try {
                            const response = await fetch('/upload', {
                                method: 'POST',
                                body: formData
                            });
                            const result = await response.json();
                            if (!result.success) {
                                console.error('图片上传失败:', result.message);
                            }
                        } catch (error) {
                            console.error('图片上传失败:', error);
                        }
                    }
                }

                // 再提交数据
                const response = await fetch('/add', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 日期, 剩余银币, 消耗银币 })
                });

                if (response.ok) {
                    location.reload();
                }
            });
        </script>

        <!-- 引入Chart.js库 -->
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

        <!-- 收入消耗变化图表脚本 -->
        <script>
            // 绘制收入消耗变化图表
            async function loadIncomeExpenseChart() {
                try {
                    // 获取所有数据
                    const response = await fetch('/data');
                    const data = await response.json();
                    const records = data.records || data.data || [];

                    // 按日期排序并取最近50条记录
                    const sortedRecords = [...records].sort((a, b) => new Date(a.日期) - new Date(b.日期)).slice(-50);

                    // 准备图表数据
                    const dates = sortedRecords.map(record => {
                        const date = new Date(record.日期);
                        return `${date.getMonth() + 1}/${date.getDate()}`;
                    });

                    const incomeData = sortedRecords.map(record => parseFloat(record.今日收益) || 0);
                    const expenseData = sortedRecords.map(record => parseFloat(record.消耗银币) || 0);

                    // 创建图表
                    const ctx = document.getElementById('incomeExpenseChart').getContext('2d');

                    // 如果图表已存在，销毁它
                    if (window.incomeExpenseChartInstance) {
                        window.incomeExpenseChartInstance.destroy();
                    }

                    window.incomeExpenseChartInstance = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: dates,
                            datasets: [
                                {
                                    label: '每日收入',
                                    data: incomeData,
                                    borderColor: '#10b981', // 绿色
                                    backgroundColor: 'rgba(16, 185, 129, 0.1)',
                                    borderWidth: 2,
                                    tension: 0.3,
                                    fill: false
                                },
                                {
                                    label: '每日消耗',
                                    data: expenseData,
                                    borderColor: '#f59e0b', // 橙色
                                    backgroundColor: 'rgba(245, 158, 11, 0.1)',
                                    borderWidth: 2,
                                    tension: 0.3,
                                    fill: false
                                }
                            ]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            scales: {
                                y: {
                                    beginAtZero: true,
                                    ticks: {
                                        callback: function (value) {
                                            return value.toLocaleString();
                                        }
                                    }
                                },
                                x: {
                                    ticks: {
                                        maxRotation: 45,
                                        minRotation: 45,
                                        autoSkip: true,
                                        maxTicksLimit: 10
                                    }
                                }
                            },
                            plugins: {
                                legend: {
                                    position: 'top',
                                    labels: {
                                        font: {
                                            size: 10
                                        }
                                    }
                                },
                                tooltip: {
                                    callbacks: {
                                        label: function (context) {
                                            let label = context.dataset.label || '';
                                            if (label) {
                                                label += ': ';
                                            }
                                            label += context.parsed.y.toLocaleString();
                                            return label;
                                        }
                                    }
                                }
                            }
                        }
                    });
                } catch (error) {
                    console.error('加载收入消耗图表失败:', error);
                }
            }

            // 页面加载完成后初始化图表
            document.addEventListener('DOMContentLoaded', function () {
                // 等待DOM和数据加载完成后再绘制图表
                setTimeout(loadIncomeExpenseChart, 1000);
            });
        </script>
